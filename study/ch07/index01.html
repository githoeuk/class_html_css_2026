<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/sytle.css" />
  </head>
  <body>
    <!-- 패턴 1 : 완전 가운데 정렬 -->
    <div class="container">
      <h1>패턴 1 : 완전 가운데</h1>
    </div>

    <!-- 패턴 2 : 네비게이션 바 -->
    <section class="sectoin2">
      <span class="logo">logo</span>
      <nav class="menu">
        <a href="#">메뉴1</a>
        <a href="#">메뉴2</a>
        <a href="#">메뉴3</a>
      </nav>
    </section>
    <!-- 패턴 3 : 카드 그리드 -->
    <section class="sectoin3">
      <div class="cards">
        <div class="card">카드1</div>
        <div class="card">카드2</div>
        <div class="card">카드3</div>
        <div class="card">카드4</div>
      </div>
    </section>

    <!-- 패턴 4 : 사이드바 + 메인 -->
    <div class="allBar">
      <div class="side">사이드바</div>
      <div class="main">메인콘텐츠</div>
    </div>

    <!-- 패턴5 : 히어로 세션 -->
    <section class="hero">
      <h2 class="hero-text">히어로 세션</h2>
    </section>

    <!-- 패턴 6 스티키 푸터

     content-wrapper가 남은 공간을 전부 차지. footer를 맨 아래로 밀어냄 -->
    <!-- 패턴7 : 반응형 2단 -> 1단 -->
    <div class="way">
      <div class="left">왼쪽</div>
      <div class="right">오른쪽</div>
    </div>

    <!-- footer는 content-wrapper 밖에 이어야 맨 아래 고정 됨 -->
    <footer class="">2026 CSS Layout Pastterns.</footer>
  </body>
</html>
