<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header>
      <h2 class="logo">TenCoding</h2>
      <div class="menu">
        <p>강의</p>
        <p>로드맵</p>
        <p>수강후기</p>
      </div>
      <button class="login">로그인</button>
    </header>
    <main>
      <section class="serach">
        <h1>코딩, 쉽고 재밌게 배우자</h1>
        <p>실전 프로젝트로 배우는 웹 개발</p>
        <div class="searchbar">
          <input type="text" placeholder="배우고 싶은 기술을 검색하세요" />
          <button>검색</button>
        </div>
      </section>
      <section class="class">
        <h2>인기 강의 TOP 4</h2>
        <div class="card-list">
          <div class="cards">
            <img src="https://picsum.photos/seed/photo1/120/120" alt="" />
            <h3>HTML/CSS기초</h3>
            <p>24강|무료</p>
          </div>

          <div class="cards">
            <img src="https://picsum.photos/seed/photo2/120/120" alt="" />
            <h3>HTML/CSS기초</h3>
            <p>24강|무료</p>
          </div>

          <div class="cards">
            <img src="https://picsum.photos/seed/photo3/120/120" alt="" />
            <h3>HTML/CSS기초</h3>
            <p>24강|무료</p>
          </div>

          <div class="cards">
            <img src="https://picsum.photos/seed/photo4/120/120" alt="" />
            <h3>HTML/CSS기초</h3>
            <p>24강|무료</p>
          </div>
        </div>
      </section>
      <section class="info">
        <h1>학습 로드맵</h1>
        <div class="category">
          <div class="ct-card">
            <span>1</span>
            <h2>HTML/CSS</h2>
          </div>
        </div>
      </section>
      <section class="review">
        <div>
          <span>*****</span>
          <p>비전공자인데 진짜 쉽게 배웠어요!</p>
          <p>- 김민수</p>
        </div>
      </section>
    </main>
    <footer>
      <div class="tail-img">
        <h1>지금 시작하세요</h1>
        <p>첫 강의는 무료입니다</p>
        <button>무료 체험하기</button>
      </div>
      <div class="tail-text"></div>
    </footer>
  </body>
</html>
