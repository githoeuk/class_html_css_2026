<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        color: white;
      }
      .px {
        width: 300px;
        background-color: #3c82f5;
        margin: 10px;
        padding: 10px 10px;
      }
      .per {
        width: 50%;
        background-color: #8b5cf4;
        margin: 10px;
        padding: 10px 10px;
      }
      .vh {
        height: 30vh;
        background-color: #10b982;
        margin: 10px;
        padding: 10px 10px;
      }
    </style>
  </head>
  <body>
    <div class="px">width: 300px (고정! 창 줄여도 안 변함)</div>
    <div class="per">width: 50% (창 줄이면 같이 줄어듦)</div>
    <div class="vh">height: 30vh (화면 높이의 30%)</div>
  </body>
</html>
