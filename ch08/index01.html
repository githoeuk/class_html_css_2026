<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* 결함 선택자 중간 기호가 공백 h1 태그에 모든 자손들(하위 선택자) */
      h1 p {
        color: green;
        /* 현재 h1태그에는 자손이 없음 */
      }
      /* 인접 형제 선택자  */
      h1 + p {
        color: aqua;
      }

      /* 뒤에 오는 선택된 태그의 형제 선택자 */
      /* h1에 p태그의 모든 형재들  */
      h1 ~ p {
        color: blue;
      }
    </style>
  </head>
  <body>
    <p>가나다라마바사</p>
    <h1>여기가 h1</h1>
    <p>가나다라마바사</p>
    <p>가나다라마바사</p>
    <p>가나다라마바사</p>
    <p>가나다라바사</p>
    <div>123456789</div>
  </body>
</html>
