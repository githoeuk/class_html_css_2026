<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        display: flex;
        border: 2px solid green;
        margin: 10px;
        padding: 10px;
      }
      .item {
        border: 2px solid green;
        background-color: orangered;
        width: 100px;
        height: 100px;
        margin: 5px;
        color: white;
        border-radius: 10px;
        /* display- flex로 변경 - display 기능인가? */
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
    </div>
  </body>
</html>
